<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>File Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; display: flex; height: 100vh; background: #1a1a2e; color: #eee; overflow: hidden; }
  #sidebar { width: 340px; min-width: 160px; max-width: 70vw; display: flex; flex-direction: column; flex-shrink: 0; }
  #search-box { padding: 10px; background: #16213e; }
  #home-btn { display: block; padding: 6px 10px; margin-bottom: 8px; background: #0a1628; border: 1px solid #1e2d4a; border-radius: 5px; color: #7a9abf; font-size: 12px; text-decoration: none; }
  #home-btn:hover { background: #111f38; color: #aaccee; }
  #search { width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid #444; background: #0f3460; color: #eee; font-size: 14px; }
  #filter-btns { display: flex; gap: 4px; margin-top: 8px; }
  .filter-btn { flex: 1; padding: 4px; border: 1px solid #444; border-radius: 4px; background: #0f3460; color: #aaa; cursor: pointer; font-size: 11px; }
  .filter-btn.active { background: #e94560; color: #fff; border-color: #e94560; }
  #sort-btns { display: flex; gap: 3px; margin-top: 6px; }
  .sort-btn { flex: 1; padding: 3px; border: 1px solid #333; border-radius: 3px; background: #0a1628; color: #777; cursor: pointer; font-size: 10px; }
  .sort-btn.active { background: #1a4a7a; color: #adf; border-color: #3a7abf; }
  #file-list { flex: 1; overflow-y: auto; }
  .file-item { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #222; font-size: 13px; }
  .file-item:hover { background: #0f3460; }
  .file-item.active { background: #e94560; }
  .file-name { font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-dir { font-size: 11px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-date { font-size: 10px; color: #666; margin-top: 2px; }
  .badge { font-size: 10px; padding: 1px 5px; border-radius: 3px; margin-left: 5px; }
  .badge-md { background: #2d6a4f; color: #95d5b2; }
  .badge-img { background: #7b2d8b; color: #e0aaff; }
  .badge-json { background: #1a4a7a; color: #7ad4ff; }
  #json-body { display:none; background: #0d1117; border-radius: 6px; padding: 16px; overflow-x: auto; }
  #json-body pre { font-family: monospace; font-size: 0.88em; line-height: 1.6; color: #c8e0f0; white-space: pre-wrap; word-break: break-all; }
  #edit-area { display:none; width:100%; min-height:300px; background:#0d1117; border:1px solid #1a4a7a; border-radius:6px; color:#c8e0f0; font-family:monospace; font-size:0.85em; padding:12px; resize:vertical; outline:none; line-height:1.6; }
  #edit-area:focus { border-color:#4488cc; }
  .edit-bar { display:none; gap:.5rem; margin-top:.75rem; align-items:center; }
  .edit-bar .save-btn { padding:.4rem 1rem; background:#1a6b3c; border:none; border-radius:5px; color:#fff; cursor:pointer; font-size:.85rem; }
  .edit-bar .save-btn:hover { background:#27ae60; }
  .edit-bar .cancel-btn { padding:.4rem 1rem; background:#1a2a4a; border:1px solid #1e2d4a; border-radius:5px; color:#aaa; cursor:pointer; font-size:.85rem; }
  .edit-bar .err-msg { font-size:.78rem; color:#e94560; flex:1; }
  .badge-dup { background: #7a5c00; color: #ffd966; }
  #divider { width: 5px; background: #222; cursor: col-resize; flex-shrink: 0; transition: background 0.1s; }
  #divider:hover, #divider.dragging { background: #e94560; }
  #main { flex: 1; overflow: auto; padding: 24px; background: #0d1117; min-width: 0; position: relative; }
  #content { max-width: 860px; margin: 0 auto; }
  #content img { max-width: 100%; border-radius: 8px; }
  #md-body { line-height: 1.8; }
  #md-body h1,#md-body h2,#md-body h3 { margin: 1em 0 0.5em; color: #58a6ff; }
  #md-body p { margin: 0.5em 0; }
  #md-body code { background: #161b22; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
  #md-body pre { background: #161b22; padding: 16px; border-radius: 8px; overflow-x: auto; margin: 1em 0; }
  #md-body blockquote { border-left: 4px solid #444; padding-left: 12px; color: #8b949e; }
  #md-body ul,#md-body ol { padding-left: 1.5em; margin: 0.5em 0; }
  #md-body a { color: #58a6ff; }
  #md-body hr { border-color: #333; margin: 1.5em 0; }
  #placeholder { text-align: center; color: #444; margin-top: 20vh; font-size: 18px; }
  #spinner { display: none; position: absolute; inset: 0; align-items: center; justify-content: center; flex-direction: column; gap: 16px; color: #888; font-size: 14px; pointer-events: none; z-index: 100; }
  #spinner::before { content: ''; width: 52px; height: 52px; border: 4px solid #222; border-top-color: #e94560; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #filepath-bar { display: none; align-items: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  #rename-input { font-size: 12px; background: #0d1117; border: 1px solid #4488cc; border-radius: 4px; color: #e0e6f0; padding: 2px 6px; display: none; font-family: monospace; min-width: 160px; outline: none; }
  #rename-btn { padding: 5px 14px; background: #1a4a2a; color: #7ad4a0; border: none; border-radius: 5px; cursor: pointer; font-size: 13px; white-space: nowrap; }
  #rename-btn:hover { background: #1e6030; }
  #upload-btn { padding: 5px 14px; background: #1a3a5a; color: #7ab4e0; border: none; border-radius: 5px; cursor: pointer; font-size: 13px; white-space: nowrap; }
  #upload-btn:hover { background: #1e4a7a; }
  #filepath { font-size: 12px; color: #666; word-break: break-all; flex: 1; display: flex; flex-wrap: wrap; align-items: center; gap: 2px; }
  .crumb { color: #558; cursor: pointer; padding: 1px 4px; border-radius: 3px; transition: .15s; white-space: nowrap; }
  .crumb:hover { color: #e94560; background: #1a1030; }
  .crumb-sep { color: #333; padding: 0 1px; }
  .crumb-file { color: #889; cursor: default; }
  #edit-btn { padding: 5px 14px; background: #1a4a6a; color: #7ad4ff; border: none; border-radius: 5px; cursor: pointer; font-size: 13px; white-space: nowrap; display: none; }
  #edit-btn:hover { background: #1e5a8a; }
  #delete-btn { padding: 5px 14px; background: #c0392b; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-size: 13px; white-space: nowrap; }
  #delete-btn:hover { background: #e74c3c; }
  #compress-btn { padding: 5px 14px; background: #1a6b3c; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-size: 13px; white-space: nowrap; }
  #compress-btn:hover { background: #27ae60; }
  #compress-btn:disabled { background: #333; color: #666; cursor: default; }
  #count { padding: 6px 12px; font-size: 11px; color: #666; background: #111; }
</style>
</head>
<body>
<div id="sidebar">
  <div id="search-box">
    <a id="home-btn" href="/"><i class="fa fa-chevron-left"></i> agora</a>
    <input id="search" type="text" placeholder="ファイル名・パスで検索..." oninput="renderList()">
    <div id="filter-btns">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('md',this)">Markdown</button>
      <button class="filter-btn" onclick="setFilter('image',this)">Image</button>
      <button class="filter-btn" onclick="setFilter('json',this)">JSON</button>
    </div>
    <div id="sort-btns">
      <button class="sort-btn active" onclick="setSort('path',this)">パス</button>
      <button class="sort-btn" onclick="setSort('name',this)">名前</button>
      <button class="sort-btn" onclick="setSort('mtime',this)">更新日</button>
      <button class="sort-btn" onclick="setSort('ctime',this)">作成日</button>
      <button class="sort-btn" onclick="setSort('size',this)">サイズ</button>
      <button class="sort-btn" onclick="setSort('mime',this)">mime</button>
    </div>
  </div>
  <div id="count"></div>
  <div id="file-list"></div>
</div>
<div id="divider"></div>
<div id="main">
  <div id="spinner">読み込み中...</div>
  <div id="content">
    <div id="placeholder">← ファイルを選んでください</div>
    <div id="filepath-bar">
      <div id="filepath" data-fullpath=""></div>
      <button id="compress-btn" onclick="compressFile()" style="display:none"><i class="fa fa-compress"></i> 軽量化</button>
      <button id="edit-btn" onclick="startEdit()" style="display:none"><i class="fa fa-pen"></i> 編集</button>
      <button id="rename-btn" onclick="startRename()"><i class="fa fa-i-cursor"></i> リネーム</button>
      <input id="rename-input" type="text" placeholder="新しいファイル名" onkeydown="onRenameKey(event)">
      <button id="upload-btn" onclick="document.getElementById('upload-input').click()"><i class="fa fa-upload"></i> アップロード</button>
      <input type="file" id="upload-input" style="display:none" multiple accept=".md,.json,.jpg,.jpeg,.png,.gif,.webp,.svg" onchange="uploadFiles(this)">
      <button id="delete-btn" onclick="deleteFile()"><i class="fa fa-trash"></i> 削除</button>
    </div>
    <div id="md-body" style="display:none"></div>
    <div id="json-body" style="display:none"><pre id="json-pre"></pre></div>
    <textarea id="edit-area" spellcheck="false" onkeydown="if(event.key==='Escape')cancelEdit()"></textarea>
    <div class="edit-bar" id="edit-bar">
      <button class="save-btn" onclick="saveEdit()"><i class="fa fa-floppy-disk"></i> 保存</button>
      <button class="cancel-btn" onclick="cancelEdit()">キャンセル</button>
      <span class="err-msg" id="edit-err"></span>
    </div>
    <img id="img-view" style="display:none">
  </div>
</div>
<script>
let allFiles = [], filteredFiles = [], currentFilter = 'all', currentSort = 'path', activeItem = null, currentIdx = -1;

function renderBreadcrumb(fullPath) {
  const el = document.getElementById('filepath');
  el.innerHTML = '';
  el.dataset.fullpath = fullPath; // フルパスはdata属性に保持
  // 表示は /srv/ を除いたパスで
  const displayPath = fullPath.replace(/^\/srv\//, '');
  const parts = displayPath.split('/').filter(Boolean);
  let accumulated = '';
  parts.forEach((part, i) => {
    // スコープ検索用のaccumulatedはフルパスで計算
    accumulated += (i === 0 ? '/' + 'srv/' + fullPath.split('/').filter(Boolean)[0] + '/' : '') + part + '/';
    const isLast = i === parts.length - 1;
    const sep = document.createElement('span');
    sep.className = 'crumb-sep';
    sep.textContent = '/';
    el.appendChild(sep);
    const crumb = document.createElement('span');
    if (isLast) {
      crumb.className = 'crumb-file';
      crumb.textContent = part;
    } else {
      crumb.className = 'crumb';
      crumb.textContent = part;
      const scopePath = fullPath.split('/').slice(0, i + 3).join('/'); // /srv/xxx/... のフルパス
      crumb.onclick = () => {
        document.getElementById('search').value = scopePath;
        renderList();
      };
    }
    el.appendChild(crumb);
  });
}

async function init() {
  const res = await fetch('/api/file_manager/files');
  allFiles = await res.json();
  renderList();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function setSort(s, btn) {
  currentSort = s;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function sortFiles(files) {
  return [...files].sort((a, b) => {
    if (currentSort === 'name')  return a.name.localeCompare(b.name);
    if (currentSort === 'mtime') return b.mtime - a.mtime;
    if (currentSort === 'ctime') return b.ctime - a.ctime;
    if (currentSort === 'size')  return b.size - a.size;
    if (currentSort === 'mime')  return a.mime.localeCompare(b.mime);
    return a.path.localeCompare(b.path);
  });
}

function fmtSize(bytes) {
  if (bytes === 0) return '0B';
  const u = ['B','KB','MB','GB'];
  const i = Math.floor(Math.log(bytes) / Math.log(1024));
  return (bytes / Math.pow(1024, i)).toFixed(i ? 1 : 0) + u[i];
}

function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(ts * 1000);
  return d.toLocaleDateString('ja-JP') + ' ' + d.toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
}

function renderList() {
  const q = document.getElementById('search').value.toLowerCase();
  const base = allFiles.filter(f => {
    if (currentFilter !== 'all' && f.type !== currentFilter) return false;
    return f.name.toLowerCase().includes(q) || f.path.toLowerCase().includes(q);
  });
  filteredFiles = sortFiles(base);
  // 同一サイズ検出
  const sizeCount = {};
  filteredFiles.forEach(f => { if (f.size > 0) sizeCount[f.size] = (sizeCount[f.size] || 0) + 1; });
  const dupSizes = new Set(Object.keys(sizeCount).filter(s => sizeCount[s] > 1).map(Number));
  document.getElementById('count').textContent = `${filteredFiles.length} files`;
  const list = document.getElementById('file-list');
  list.innerHTML = filteredFiles.map((f,i) => {
    let sub = '';
    if (currentSort === 'mtime') sub = `<div class="file-date">更新: ${fmtDate(f.mtime)}</div>`;
    else if (currentSort === 'ctime') sub = `<div class="file-date">作成: ${fmtDate(f.ctime)}</div>`;
    else if (currentSort === 'size') sub = `<div class="file-date">${fmtSize(f.size)}</div>`;
    else if (currentSort === 'mime') sub = `<div class="file-date">${f.mime}</div>`;
    const dupBadge = dupSizes.has(f.size) ? `<span class="badge badge-dup">dup?</span>` : '';
    return `
    <div class="file-item" onclick="openByFilteredIdx(${i})" data-idx="${i}">
      <div class="file-name">${f.name}<span class="badge badge-${f.type}">${f.type}</span>${dupBadge}</div>
      <div class="file-dir">${f.dir}</div>
      ${sub}
    </div>`;
  }).join('');
  currentIdx = -1;
}

function openByFilteredIdx(i) {
  if (_isEditing) return;
  currentIdx = i;
  const items = document.querySelectorAll('.file-item');
  if (activeItem) activeItem.classList.remove('active');
  activeItem = items[i];
  activeItem.classList.add('active');
  activeItem.scrollIntoView({ block: 'nearest' });
  openFile(allFiles.indexOf(filteredFiles[i]));
}

async function openFile(idx) {
  const f = allFiles[idx];
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('filepath-bar').style.display = 'flex';
  renderBreadcrumb(f.path);
  document.getElementById('spinner').style.display = 'flex';
  document.getElementById('md-body').style.display = 'none';
  document.getElementById('json-body').style.display = 'none';
  document.getElementById('img-view').style.display = 'none';
  document.getElementById('edit-area').style.display = 'none';
  document.getElementById('edit-bar').style.display = 'none';
  document.getElementById('edit-btn').style.display = (f.type === 'json' || f.type === 'md') ? 'block' : 'none';
  const compBtn = document.getElementById('compress-btn');
  compBtn.style.display = f.type === 'image' ? 'block' : 'none';
  compBtn.disabled = false;
  compBtn.innerHTML = '<i class="fa fa-compress"></i> 軽量化';
  const hideSpinner = () => { document.getElementById('spinner').style.display = 'none'; };
  if (f.type === 'image') {
    const img = document.getElementById('img-view');
    img.onload = hideSpinner;
    img.onerror = hideSpinner;
    img.src = `/api/file_manager/file?path=${encodeURIComponent(f.path)}`;
    img.style.display = 'block';
  } else if (f.type === 'json') {
    const res = await fetch(`/api/file_manager/file?path=${encodeURIComponent(f.path)}`);
    const text = await res.text();
    try {
      document.getElementById('json-pre').textContent = JSON.stringify(JSON.parse(text), null, 2);
    } catch {
      document.getElementById('json-pre').textContent = text;
    }
    document.getElementById('json-body').style.display = 'block';
    hideSpinner();
  } else {
    const res = await fetch(`/api/file_manager/file?path=${encodeURIComponent(f.path)}`);
    const text = await res.text();
    document.getElementById('md-body').innerHTML = marked.parse(text);
    document.getElementById('md-body').style.display = 'block';
    hideSpinner();
  }
}

async function compressFile() {
  const path = document.getElementById('filepath').dataset.fullpath;
  if (!path) return;
  if (!confirm(`画像を軽量化しますか？（上書き保存されます）\n\n${path}`)) return;
  const btn = document.getElementById('compress-btn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> 処理中...';
  const res = await fetch(`/api/file_manager/compress?path=${encodeURIComponent(path)}`, { method: 'POST' });
  const json = await res.json();
  if (res.ok) {
    const before = fmtSize(json.before);
    const after = fmtSize(json.after);
    const pct = Math.round((1 - json.after / json.before) * 100);
    btn.innerHTML = '<i class="fa fa-check"></i> ' + before + '→' + after + ' (-' + pct + '%)';
    // allFilesのsizeを更新
    const f = allFiles.find(f => f.path === path);
    if (f) f.size = json.after;
    // 画像リロード
    const img = document.getElementById('img-view');
    img.src = `/api/file_manager/file?path=${encodeURIComponent(path)}&t=${Date.now()}`;
  } else {
    btn.textContent = '❌ 失敗';
    btn.disabled = false;
  }
}

async function deleteFile() {
  const path = document.getElementById('filepath').dataset.fullpath;
  if (!path) return;
  if (!confirm(`本当に削除しますか？\n\n${path}`)) return;
  const res = await fetch(`/api/file_manager/file?path=${encodeURIComponent(path)}`, { method: 'DELETE' });
  if (res.ok) {
    const nextIdx = currentIdx < filteredFiles.length - 1 ? currentIdx : currentIdx - 1;
    allFiles = allFiles.filter(f => f.path !== path);
    renderList();
    if (nextIdx >= 0 && filteredFiles.length > 0) {
      openByFilteredIdx(Math.min(nextIdx, filteredFiles.length - 1));
    } else {
      ['filepath-bar','md-body','img-view','json-body','edit-area','edit-bar','edit-btn'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = 'none';
      });
      document.getElementById('placeholder').style.display = 'block';
      document.getElementById('placeholder').textContent = `✅ 削除しました: ${path.split('/').pop()}`;
      activeItem = null;
    }
  } else {
    const msg = await res.text().catch(() => '');
    alert('削除に失敗しました\n' + msg);
  }
}

// ── 編集機能 ──
let _editOriginal = '';
let _isEditing = false;

function startEdit() {
  _isEditing = true;
  document.getElementById('file-list').style.pointerEvents = 'none';
  document.getElementById('file-list').style.opacity = '0.4';
  const pre = document.getElementById('json-pre');
  const mdBody = document.getElementById('md-body');
  const area = document.getElementById('edit-area');
  const bar = document.getElementById('edit-bar');
  const jsonBodyVisible = document.getElementById('json-body').style.display !== 'none';
  const content = jsonBodyVisible ? pre.textContent : mdBody.innerText;
  _editOriginal = content;
  area.value = content;
  area.style.display = 'block';
  bar.style.display = 'flex';
  document.getElementById('json-body').style.display = 'none';
  document.getElementById('md-body').style.display = 'none';
  document.getElementById('edit-btn').style.display = 'none';
  document.getElementById('edit-err').textContent = '';
  area.focus();
}

function cancelEdit() {
  _isEditing = false;
  document.getElementById('file-list').style.pointerEvents = '';
  document.getElementById('file-list').style.opacity = '';
  document.getElementById('edit-area').style.display = 'none';
  document.getElementById('edit-bar').style.display = 'none';
  document.getElementById('edit-btn').style.display = 'block';
  // 表示を戻す
  const f = filteredFiles[currentIdx];
  if (f) openFile(currentIdx);
}

async function saveEdit() {
  const path = document.getElementById('filepath').dataset.fullpath;
  const area = document.getElementById('edit-area');
  const errEl = document.getElementById('edit-err');
  const content = area.value;
  errEl.textContent = '';
  // JSONの場合はバリデーション
  if (path.endsWith('.json')) {
    try { JSON.parse(content); } catch(e) {
      errEl.textContent = '⚠ JSON構文エラー: ' + e.message;
      return;
    }
  }
  const res = await fetch(`/api/file_manager/file?path=${encodeURIComponent(path)}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'text/plain' },
    body: content,
  });
  if (res.ok) {
    errEl.style.color = '#27ae60';
    errEl.textContent = '✅ 保存しました';
    setTimeout(() => { cancelEdit(); }, 800);
  } else {
    errEl.style.color = '#e94560';
    errEl.textContent = '保存に失敗しました';
  }
}

// ── リネーム ──
function startRename() {
  const path = document.getElementById('filepath').dataset.fullpath;
  if (!path) return;
  const input = document.getElementById('rename-input');
  input.value = path.split('/').pop();
  input.style.display = 'inline-block';
  input.focus();
  input.select();
}

async function onRenameKey(e) {
  if (e.key === 'Escape') {
    document.getElementById('rename-input').style.display = 'none';
    return;
  }
  if (e.key !== 'Enter') return;
  const input = document.getElementById('rename-input');
  const newname = input.value.trim();
  const oldPath = document.getElementById('filepath').dataset.fullpath;
  if (!newname || newname === oldPath.split('/').pop()) { input.style.display = 'none'; return; }
  const res = await fetch(`/api/file_manager/file?path=${encodeURIComponent(oldPath)}&newname=${encodeURIComponent(newname)}`, { method: 'PATCH' });
  const data = await res.json();
  if (data.ok) {
    // ファイル一覧を更新
    const f = allFiles.find(f => f.path === oldPath);
    if (f) { f.path = data.path; f.name = newname; }
    input.style.display = 'none';
    renderList();
    renderBreadcrumb(data.path);
  } else {
    alert('リネーム失敗: ' + (data.error || ''));
  }
}

// ── アップロード ──
async function uploadFiles(input) {
  const dir = document.getElementById('filepath').dataset.fullpath.split('/').slice(0, -1).join('/') || '/srv/agora';
  const files = Array.from(input.files);
  let uploaded = 0;
  for (const file of files) {
    const fd = new FormData();
    fd.append('file', file);
    const res = await fetch(`/api/file_manager/upload?dir=${encodeURIComponent(dir)}`, { method: 'POST', body: fd });
    const data = await res.json();
    if (data.ok) {
      allFiles.push({ path: data.path, name: data.name, type: data.type, dir, mtime: Date.now()/1000, ctime: Date.now()/1000, size: file.size, mime: file.type });
      uploaded++;
    }
  }
  input.value = '';
  if (uploaded > 0) {
    renderList();
    alert(`✅ ${uploaded}件アップロードしました`);
  }
}

// ドラッグ仕切り線
const divider = document.getElementById('divider');
const sidebar = document.getElementById('sidebar');
let dragging = false;
divider.addEventListener('mousedown', e => {
  dragging = true;
  divider.classList.add('dragging');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
});
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const w = e.clientX;
  if (w > 160 && w < window.innerWidth * 0.7) {
    sidebar.style.width = w + 'px';
  }
});
document.addEventListener('mouseup', () => {
  if (!dragging) return;
  dragging = false;
  divider.classList.remove('dragging');
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
});

// キーボード
document.addEventListener('keydown', e => {
  // 編集中・リネーム中はナビゲーション系ショートカットを全てスキップ
  if (_isEditing) { if (e.key === 'Escape') cancelEdit(); return; }
  if (e.target.id === 'rename-input') return;
  if (e.target.id === 'search') {
    if (e.key === 'ArrowDown') { e.preventDefault(); moveCursor(1); }
    if (e.key === 'ArrowUp')   { e.preventDefault(); moveCursor(-1); }
    if (e.key === 'Enter' && currentIdx >= 0) openByFilteredIdx(currentIdx);
    return;
  }
  if (e.key === 'ArrowDown') { e.preventDefault(); moveCursor(1); }
  if (e.key === 'ArrowUp')   { e.preventDefault(); moveCursor(-1); }
  if (e.key === 'Enter' && currentIdx >= 0) openByFilteredIdx(currentIdx);
  if (e.key === '/') { e.preventDefault(); document.getElementById('search').focus(); }
  if (e.key === 'd' && currentIdx >= 0) deleteFile();
  if (e.key === 'c' && currentIdx >= 0) compressFile();
});

function moveCursor(dir) {
  if (filteredFiles.length === 0) return;
  currentIdx = Math.max(0, Math.min(filteredFiles.length - 1, currentIdx + dir));
  openByFilteredIdx(currentIdx);
}

init();
</script>
